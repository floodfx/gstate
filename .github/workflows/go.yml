name: Go

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: build / lint / vuln / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Install dev tools
        run: just install-tools

      - name: Run CI
        run: just ci
